<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Saffron Skies Ranch</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Georgia', serif;
            line-height: 1.6;
            color: #333;
        }
        
        /* Navigation */
        nav {
            background-color: #8B4513;
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }
        
        nav a {
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            transition: opacity 0.3s;
        }
        
        nav a:hover {
            opacity: 0.8;
        }
        
        /* Page Header */
        .page-header {
            background-color: #f5f5f5;
            padding: 3rem 2rem;
            text-align: center;
        }
        
        .page-header h1 {
            color: #8B4513;
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
        
        .page-header p {
            color: #666;
            font-size: 1.2rem;
        }
        
        /* Gallery */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }
        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }
        
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        
        .gallery-item:hover {
            transform: scale(1.05);
        }
        
        .gallery-item img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
        }
        
        .gallery-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(139, 69, 19, 0.85);
            color: white;
            padding: 1rem;
            text-align: center;
            font-size: 1.1rem;
        }
        
        /* Footer */
        footer {
            background-color: #8B4513;
            color: white;
            text-align: center;
            padding: 2rem;
            margin-top: 4rem;
        }
        
        @media (max-width: 768px) {
            .page-header h1 {
                font-size: 2rem;
            }
            
            nav ul {
                flex-direction: column;
                gap: 1rem;
            }
            
            .gallery-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
    
    <div class="page-header">
        <h1>Our Gallery</h1>
        <p>Explore the beauty of Saffron Skies Ranch</p>
    </div>
    
    <div class="container">
        <div class="gallery-grid">
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1519167758481-83f29da8c2b1?w=800" alt="Event Hall Interior">
                <div class="gallery-caption">Event Hall Interior</div>
            </div>
            
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1464366400600-7168b8af9bc3?w=800" alt="Outdoor Ceremony Area">
                <div class="gallery-caption">Outdoor Ceremony Area</div>
            </div>
            
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1470229722913-7c0e2dbbafd3?w=800" alt="Ranch Grounds">
                <div class="gallery-caption">Beautiful Ranch Grounds</div>
            </div>
            
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1478146896981-b80fe463b330?w=800" alt="Sunset View">
                <div class="gallery-caption">Sunset Views</div>
            </div>
            
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1505236858219-8359eb29e329?w=800" alt="Reception Setup">
                <div class="gallery-caption">Reception Setup</div>
            </div>
            
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30?w=800" alt="Event Details">
                <div class="gallery-caption">Perfect Event Details</div>
            </div>
        </div>
    </div>
    
    <footer>
        <p>&copy; 2024 Saffron Skies Ranch. All rights reserved.</p>
    </footer>
</body>
</html>
